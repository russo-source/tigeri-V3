server {
    listen 80 default_server;
    server_name _;

    root /var/www/tigeri-frontend;
    index index.html;

    # Long cache for static assets
    location /_next/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location ~ \.(js|css|woff2?|svg|png|jpg|ico)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SSE chat stream — flush immediately, no buffering, long timeout.
    location = /api/chat/stream {
        proxy_pass         http://127.0.0.1:8000/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 5m;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # Reverse proxy /api/* → uvicorn on 127.0.0.1:8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — App Router pages already pre-rendered as <route>/index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}

# HTTPS-enabled Tigeri site config (post-certbot).
# Includes SSE-friendly block for /api/chat/stream and standard /api/* proxy.

server {
    server_name 100-48-88-95.sslip.io ec2-100-48-88-95.compute-1.amazonaws.com _;

    root /var/www/tigeri-frontend;
    index index.html;

    # ---- Baseline security headers ---------------------------------------
    # `always` so they reach error responses too. Re-emitted in any location
    # block that adds its own header (nginx replaces, not merges).
    # HSTS without `preload` because the cert is on a sslip.io subdomain we
    # don't own — switch to a real domain before adding `preload`.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP — `'unsafe-inline'` on script/style is required by Next.js static
    # export (inline JSON manifests + Tailwind preflight). Tighten to nonce-
    # based CSP after migrating off static export.
    # frame-src allows the in-chat Google Maps Embed iframe (PlaceCard).
    # Without it, the default-src 'self' fallback blocks the iframe and the
    # browser shows "This content is blocked. Contact the site owner..."
    # img-src includes the maps tiles and Meet/Calendar artwork.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com; connect-src 'self'; frame-src 'self' https://www.google.com https://*.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Long cache for static assets
    location /_next/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location ~ \.(js|css|woff2?|svg|png|jpg|ico)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SSE chat stream — flush immediately, no buffering, long timeout
    location = /api/chat/stream {
        proxy_pass         http://127.0.0.1:8000/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 5m;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # Reverse proxy /api/* → uvicorn on 127.0.0.1:8000
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/100-48-88-95.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/100-48-88-95.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = 100-48-88-95.sslip.io) {
        return 301 https://$host$request_uri;
    }
    listen 80 default_server;
    server_name 100-48-88-95.sslip.io ec2-100-48-88-95.compute-1.amazonaws.com _;
    return 404;
}
